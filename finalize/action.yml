name: 'WCD Builds - Finalize'
description: 'Finalize the build as Success or Failed. Uses job.status (success | failure | cancelled). Optionally send error details from a file or input for the dashboard. Requires init and create-build to have run first.'

inputs:
  error_message:
    description: 'Optional error message to send when job failed (e.g. from a previous step output). Overrides default "Job status: failure".'
    required: false
  error_log_path:
    description: 'Optional path to a file (relative to GITHUB_WORKSPACE) containing job output to send when failed, e.g. build.log. When job failed, file content is sent as ErrorMessage (truncated to 32KB). Workflows can append step output (restore, build, test, etc.) to one file so any failure is visible. Ignored if error_message is set.'
    required: false
  version:
    description: 'Optional version string (e.g. NuGet package version) to display in the Teams notification and dashboard.'
    required: false
    default: ''

outputs:
  dashboard_url:
    description: 'Direct link to the build on the dashboard'
    value: ${{ steps.finalize.outputs.dashboard_url }}

runs:
  using: 'composite'
  steps:
    - id: finalize
      if: env.WCD_BUILDS_AVAILABLE == 'true' && env.WCD_BUILD_ID != ''
      env:
        JOB_STATUS: ${{ job.status }}
        WCD_ERROR_MESSAGE: ${{ inputs.error_message }}
        WCD_ERROR_LOG_PATH: ${{ inputs.error_log_path }}
        WCD_VERSION: ${{ inputs.version }}
      shell: pwsh
      run: |
        $state = if ($env:JOB_STATUS -eq 'success') { 1 } else { 2 }
        $errorMsg = ''
        if ($env:JOB_STATUS -ne 'success') {
          if (-not [string]::IsNullOrWhiteSpace($env:WCD_ERROR_MESSAGE)) {
            $errorMsg = $env:WCD_ERROR_MESSAGE.Trim()
          } elseif (-not [string]::IsNullOrWhiteSpace($env:WCD_ERROR_LOG_PATH)) {
            $logPath = $env:WCD_ERROR_LOG_PATH
            if (-not [System.IO.Path]::IsPathRooted($logPath)) {
              $logPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath $logPath
            }
            if (Test-Path -LiteralPath $logPath -PathType Leaf) {
              $content = Get-Content -LiteralPath $logPath -Raw -ErrorAction SilentlyContinue
              if ($content) {
                $maxLen = 32768
                if ($content.Length -gt $maxLen) {
                  $content = $content.Substring($content.Length - $maxLen)
                  $content = "... (truncated, last $maxLen chars)`n`n" + $content
                }
                $errorMsg = $content.Trim()
              }
            }
          }
          if ([string]::IsNullOrWhiteSpace($errorMsg)) {
            $errorMsg = "Job status: $env:JOB_STATUS"
          }
        }
        $body = @{ State = $state; Stage = 'Completed'; ErrorMessage = $errorMsg; Version = $env:WCD_VERSION } | ConvertTo-Json
        $uri = "$env:WCD_BUILDS_URL/api/builds/$env:WCD_BUILD_ID"
        $headers = @{ Authorization = "Bearer $env:WCD_BUILDS_TOKEN"; "Content-Type" = "application/json" }
        $maxAttempts = 3
        $attempt = 0
        $success = $false
        while (-not $success -and $attempt -lt $maxAttempts) {
          $attempt++
          try {
            Invoke-WebRequest -Uri $uri -Method Post -Headers $headers -Body $body -UseBasicParsing -TimeoutSec 30 | Out-Null
            Write-Host "Finalized: state=$state (attempt $attempt)"
            $success = $true
          } catch {
            Write-Host "::warning title=WCD Finalize::Attempt $attempt/$maxAttempts failed: $($_.Exception.Message)"
            if ($attempt -lt $maxAttempts) {
              $delaySec = [Math]::Min(5 * $attempt, 15)
              Write-Host "Retrying in ${delaySec}s..."
              Start-Sleep -Seconds $delaySec
            }
          }
        }
        if (-not $success) {
          Write-Host "::warning title=WCD Finalize::All $maxAttempts attempts failed. Build may remain Running on dashboard."
        }
        $dashUrl = "$env:WCD_BUILDS_URL/Builds/Detail?id=$env:WCD_BUILD_ID"
        "dashboard_url=$dashUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        Write-Host "::notice title=WCD Build::$dashUrl"
        "## WCD Build Reporting`n**Build:** [$env:WCD_BUILD_ID]($dashUrl)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
