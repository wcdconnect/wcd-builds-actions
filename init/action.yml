name: 'WCD Builds - Init'
description: 'Resolve build service URL, health-check the service, and acquire an access token via the service token-exchange endpoint (POST /api/auth/token). Sets WCD_BUILDS_URL, WCD_BUILDS_AVAILABLE, WCD_BUILDS_TOKEN, and WCD_BUILDS_BUILD_NAME (first line of commit_message). Callers supply only client_id and client_secret; the server uses its configured tenant.'

inputs:
  builds_service_url:
    description: 'Optional override. If empty, defaults to https://appstest.wcdconnect.com/builds'
    required: false
    default: 'https://appstest.wcdconnect.com/builds'
  client_id:
    description: 'Entra ID application (client) ID'
    required: true
  client_secret:
    description: 'Entra ID client secret'
    required: true
  commit_message:
    description: 'Optional commit message (e.g. github.event.head_commit.message). First line is output as build_display_name for use as build name in create-build.'
    required: false
    default: ''

outputs:
  available:
    description: 'Whether the WCD Builds service is available (true/false)'
    value: ${{ steps.health.outputs.available }}
  url:
    description: 'Resolved build service URL'
    value: ${{ steps.resolve.outputs.url }}
  build_display_name:
    description: 'First line of commit_message, truncated to 256 chars. Also set in WCD_BUILDS_BUILD_NAME env for create-build to use automatically.'
    value: ${{ steps.build_display_name.outputs.build_display_name }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: pwsh
      run: |
        $inputUrl = "${{ inputs.builds_service_url }}".Trim()
        $url = if ($inputUrl) { $inputUrl.TrimEnd('/') } else { 'https://appstest.wcdconnect.com/builds' }
        "WCD_BUILDS_URL=$url" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "url=$url" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        Write-Host "WCD Builds URL: $url"

    - id: health
      shell: pwsh
      run: |
        try {
          $r = Invoke-WebRequest -Uri "$env:WCD_BUILDS_URL/health" -UseBasicParsing -Method Get -TimeoutSec 10
          if ($r.StatusCode -ne 200) { throw "HTTP $($r.StatusCode)" }
          "WCD_BUILDS_AVAILABLE=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "WCD Builds service reachable."
        } catch {
          Write-Host "::warning title=WCD Builds Unavailable::$($_.Exception.Message)"
          "WCD_BUILDS_AVAILABLE=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        }

    - id: auth
      if: env.WCD_BUILDS_AVAILABLE == 'true'
      shell: pwsh
      run: |
        try {
          $tokenUrl = "$env:WCD_BUILDS_URL/api/auth/token"
          $bodyObj = @{ clientId = "${{ inputs.client_id }}"; clientSecret = "${{ inputs.client_secret }}" }
          $bodyJson = $bodyObj | ConvertTo-Json
          try {
            $r = Invoke-RestMethod -Uri $tokenUrl -Method Post -Body $bodyJson -ContentType "application/json" -TimeoutSec 15
          } catch {
            $statusCode = $_.Exception.Response?.StatusCode?.value__
            $statusCode = if ($statusCode) { $statusCode } else { "unknown" }
            Write-Host "::warning title=WCD Builds Auth Failed::Token request returned HTTP $statusCode. URI: $tokenUrl"
            if ($_.ErrorDetails.Message) { Write-Host "Response: $($_.ErrorDetails.Message)" }
            throw
          }
          if (-not $r.accessToken) { throw "Response did not contain accessToken" }
          "WCD_BUILDS_TOKEN=$($r.accessToken)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "::add-mask::$($r.accessToken)"
        } catch {
          Write-Host "::warning title=WCD Builds Auth Failed::$($_.Exception.Message)"
          "WCD_BUILDS_AVAILABLE=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        }

    - id: build_display_name
      shell: pwsh
      run: |
        $msg = "${{ inputs.commit_message }}".Trim()
        $firstLine = if ($msg) { ($msg -split "`n")[0].Trim() } else { '' }
        if ($firstLine.Length -gt 256) { $firstLine = $firstLine.Substring(0, 256) }
        "build_display_name=$firstLine" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "WCD_BUILDS_BUILD_NAME=$firstLine" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
