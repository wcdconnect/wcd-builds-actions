name: 'WCD Builds - Create Build'
description: 'Register a new build with the WCD Builds API. Sets WCD_BUILD_ID as an environment variable. Requires init to have run first.'

inputs:
  app_name:
    description: 'Project name to register'
    required: true
  build_name:
    description: 'Optional display name for the build. When empty, create-build uses WCD_BUILDS_BUILD_NAME set by init (first line of commit_message).'
    required: false
    default: ''
  branch_url:
    description: 'Optional branch URL for dashboard. If empty, derived from github context.'
    required: false
    default: ''

outputs:
  build_id:
    description: 'The registered build ID (empty if registration failed)'
    value: ${{ steps.register.outputs.build_id }}

runs:
  using: 'composite'
  steps:
    - id: register
      if: env.WCD_BUILDS_AVAILABLE == 'true'
      shell: pwsh
      run: |
        $branchUrl = "${{ inputs.branch_url }}".Trim()
        if (-not $branchUrl) {
          $branchUrl = "${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}"
        }
        $buildName = "${{ inputs.build_name }}".Trim()
        if (-not $buildName -and $env:WCD_BUILDS_BUILD_NAME) {
          $buildName = $env:WCD_BUILDS_BUILD_NAME.Trim()
        }
        if ($buildName) {
          $firstLine = ($buildName -split "`n")[0].Trim()
          if ($firstLine.Length -gt 512) { $firstLine = $firstLine.Substring(0, 512) }
          $buildName = $firstLine
        }
        $runName = "${{ github.run_name }}".Trim()
        $runNumRaw = "${{ github.run_number }}".Trim()
        $runNumber = if ($runNumRaw -match '^\d+$') { [int]$runNumRaw } else { $null }
        $body = @{
          ProjectName      = "${{ inputs.app_name }}"
          BranchName       = "${{ github.ref_name }}"
          CommitSha        = "${{ github.sha }}"
          TriggerUser      = "${{ github.actor }}"
          ActionRunnerName = $env:RUNNER_NAME
          BuildName        = if ($buildName) { $buildName } else { $null }
          GitHubRunName    = if ($runName) { $runName } else { $null }
          GitHubRunNumber  = $runNumber
          GitHubActionUrl  = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BranchUrl        = $branchUrl
        } | ConvertTo-Json
        try {
          $r = Invoke-RestMethod -Uri "$env:WCD_BUILDS_URL/api/builds/create" -Method Post -Headers @{ Authorization = "Bearer $env:WCD_BUILDS_TOKEN" } -Body $body -ContentType "application/json; charset=utf-8"
          if ($r.buildId) {
            "WCD_BUILD_ID=$($r.buildId)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "build_id=$($r.buildId)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Build registered: $($r.buildId)"
            Write-Host "Dashboard: $env:WCD_BUILDS_URL/Builds/Detail?id=$($r.buildId)"
          } else { throw "Response had no buildId" }
        } catch {
          Write-Host "::warning title=WCD Build Registration Failed::$($_.Exception.Message)"
          "build_id=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        }
